services:
  mongodb:
    image: mongo:6.0
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7.0-alpine
    ports:
      - "6379:6379"

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      DOCKER_ENV: "true"
    depends_on:
      - redis

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    env_file: .env
    environment:
      DOCKER_ENV: "true"
    depends_on:
      - mongodb
      - redis

  crowd-service:
    build:
      context: .
      dockerfile: services/crowd-service/Dockerfile
    env_file: .env
    environment:
      DOCKER_ENV: "true"
    depends_on:
      - mongodb
      - redis

  queue-service:
    build:
      context: .
      dockerfile: services/queue-service/Dockerfile
    env_file: .env
    environment:
      DOCKER_ENV: "true"
    depends_on:
      - mongodb
      - redis

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    ports:
      - "5000:5000" # WebSocket port for frontend
    env_file: .env
    environment:
      DOCKER_ENV: "true"
    depends_on:
      - redis

  match-service:
    build:
      context: .
      dockerfile: services/match-service/Dockerfile
    env_file: .env
    environment:
      DOCKER_ENV: "true"
    depends_on:
      - redis

  client:
    build: ./client
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  mongodb_data:
