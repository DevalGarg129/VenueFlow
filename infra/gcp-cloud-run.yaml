apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: venueflow-gateway
  annotations:
    run.googleapis.com/ingress: "all"
spec:
  template:
    spec:
      containers:
      - image: gcr.io/YOUR_PROJECT_ID/venueflow-gateway
        ports:
        - containerPort: 8080
        env:
        - name: USER_SERVICE_URL
          value: "https://user-service-url.run.app"
        - name: KAFKA_BROKERS
          value: "your-kafka-broker-ip:9092"
        - name: REDIS_HOST
          value: "your-redis-ip"
